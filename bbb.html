<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>BBB Term-O Online 👁️</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --pop-bg: #ffb800; --pop-purple: #a29bfe; --pop-teal: #00cec9;
            --pop-pink: #fd79a8; --pop-lime: #badc58; --dark: #2d3436;
        }

        body { 
            font-family: 'Outfit', sans-serif; background: var(--pop-bg); 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
            color: var(--dark);
        }

        .panel { 
            background: white; padding: 40px; border-radius: 30px; 
            border: 6px solid var(--dark); box-shadow: 10px 10px 0 var(--dark);
            text-align: center; max-width: 450px; width: 90%;
        }

        .logo-pop {
            font-family: 'Montserrat'; font-size: 2.5em; color: white;
            -webkit-text-stroke: 2px var(--dark); filter: drop-shadow(4px 4px 0 var(--pop-pink));
            margin-bottom: 20px; text-transform: uppercase;
        }

        input {
            width: 100%; padding: 15px; margin: 10px 0; border: 4px solid var(--dark);
            border-radius: 12px; font-weight: 800; box-sizing: border-box; font-family: 'Outfit';
        }

        .btn-pop {
            width: 100%; padding: 18px; background: var(--pop-pink); color: white;
            border: 4px solid var(--dark); border-radius: 15px; font-weight: 900;
            cursor: pointer; box-shadow: 5px 5px 0 var(--dark); transition: 0.1s;
            text-transform: uppercase;
        }

        .btn-pop:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0 var(--dark); }

        #players-grid { display: flex; gap: 15px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .card { 
            background: var(--pop-lime); padding: 15px; border: 4px solid var(--dark); 
            border-radius: 15px; width: 100px; box-shadow: 4px 4px 0 var(--dark); 
        }
        .card.active { background: white; transform: scale(1.1); border-color: var(--pop-teal); border-style: dashed; }
    </style>
</head>
<body>

    <div id="lobby" class="panel">
        <div class="logo-pop">BBB ONLINE</div>
        <p style="font-weight: 800;">Escolhe uma sala e entra na casa!</p>
        <input type="text" id="room-id" placeholder="NOME DA SALA (ex: sala1)">
        <input type="text" id="my-name" placeholder="TEU NOME">
        <button class="btn-pop" onclick="joinRoom()">ENTRAR NA CASA 👁️</button>
    </div>

    <div id="game-room" class="panel" style="display:none;">
        <div id="status" style="font-weight: 900; margin-bottom: 20px; font-size: 1.2em; text-transform: uppercase;">A AGUARDAR JOGADORES...</div>
        <div id="players-grid"></div>
        
        <div id="controls" style="display:none; margin-top: 30px;">
            <button class="btn-pop" onclick="sendAction('conversar')">💬 CONVERSAR (+10 Pop)</button>
            <button class="btn-pop" style="background: var(--pop-purple); margin-top: 10px;" onclick="sendAction('treta')">🔥 CRIAR TRETA (-15 Pop)</button>
        </div>
    </div>

<script>
    // AS TUAS CHAVES CONFIGURADAS
   const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        projectId: "bigbrother-termo",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app", 
        storageBucket: "bigbrother-termo.firebasestorage.app",
        messagingSenderId: "470183788507",
        appId: "1:470183788507:web:9c186b3dd6f5ce90b6f1fe"
    };

    // Inicializa
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", myId = "";

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        const name = document.getElementById('my-name').value.trim();
        if(!currentRoom || !name) return alert("Preenche os campos!");

        myId = name + "_" + Math.floor(Math.random()*1000);
        
        // Criar jogador na base de dados
        db.ref('rooms/' + currentRoom + '/players/' + myId).set({
            name: name,
            pop: 50
        });
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-room').style.display = 'block';
        listen();
    }

    function listen() {
        db.ref('rooms/' + currentRoom).on('value', (snap) => {
            const data = snap.val();
            if(!data || !data.players) return;

            const grid = document.getElementById('players-grid');
            grid.innerHTML = "";
            const players = data.players;
            const ids = Object.keys(players);
            
            // Define quem é o turno (se não existir, o primeiro a entrar começa)
            const turn = data.turn || ids[0];

            ids.forEach(id => {
                const p = players[id];
                const isActive = (id === turn) ? 'active' : '';
                grid.innerHTML += `
                    <div class="card ${isActive}">
                        <div style="font-size: 1.5em">👤</div>
                        <b style="display:block; margin: 5px 0;">${p.name}</b>
                        <span style="font-size: 0.8em">POP: ${p.pop}%</span>
                    </div>`;
            });

            // Mostra botões apenas se for a minha vez
            document.getElementById('controls').style.display = (turn === myId) ? 'block' : 'none';
            document.getElementById('status').innerText = (turn === myId) ? "TUA VEZ: JOGA!" : "Vez de " + players[turn].name;
            
            // Cor de fundo do status muda se for a tua vez
            document.getElementById('status').style.color = (turn === myId) ? "var(--pop-pink)" : "var(--dark)";
        });
    }

    function sendAction(act) {
        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const ids = Object.keys(data.players);
            const currentIndex = ids.indexOf(myId);
            const nextIndex = (currentIndex + 1) % ids.length;
            const nextPlayerId = ids[nextIndex];

            const currentPop = data.players[myId].pop;
            const newPop = currentPop + (act === 'conversar' ? 10 : -15);

            // Atualiza a minha popularidade e passa o turno para o próximo
            let updates = {};
            updates['/players/' + myId + '/pop'] = newPop;
            updates['/turn'] = nextPlayerId;

            db.ref('rooms/' + currentRoom).update(updates);
        });
    }
</script>
</body>
</html>
