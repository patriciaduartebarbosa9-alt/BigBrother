<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Duelo de Citações 👁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --pop-bg: #ffb800; --pop-pink: #fd79a8; --pop-teal: #00cec9; --dark: #2d3436; }
        body { font-family: 'Outfit'; background: var(--pop-bg); margin: 0; min-height: 100vh; color: var(--dark); }
        
        .main-layout { display: flex; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .game-panel { flex: 2; min-width: 350px; background: white; padding: 30px; border-radius: 30px; border: 6px solid var(--dark); box-shadow: 10px 10px 0 var(--dark); text-align: center; }
        .side-panel { flex: 1; min-width: 280px; background: white; padding: 20px; border-radius: 20px; border: 4px solid var(--dark); box-shadow: 6px 6px 0 var(--dark); display: flex; flex-direction: column; height: 600px; }
        
        .logo { font-family: 'Montserrat'; font-size: 2.2em; -webkit-text-stroke: 1.5px var(--dark); color: white; filter: drop-shadow(3px 3px 0 var(--pop-pink)); margin-bottom: 15px; text-transform: uppercase; }
        .btn-pop { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; border: 3px solid var(--dark); font-weight: 900; cursor: pointer; box-shadow: 3px 3px 0 var(--dark); text-transform: uppercase; transition: 0.1s; }
        .btn-pop:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--dark); }
        
        .color-picker { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 3px solid var(--dark); cursor: pointer; }

        #canvas-container { background: white; border: 3px solid var(--dark); border-radius: 15px; padding: 10px; margin: 10px 0; display: inline-block; }
        canvas { background: #fff; cursor: crosshair; touch-action: none; display: block; }
        
        .chat-box { flex-grow: 1; overflow-y: auto; background: #f9f9f9; border: 2px solid var(--dark); border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: left; font-size: 0.9em; }
        .status-msg { background: #fff3cd; border: 2px dashed var(--dark); padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: 700; }
        
        .vote-card { border: 4px solid var(--dark); border-radius: 20px; padding: 15px; margin-top: 20px; background: #f9f9f9; }
        .vote-card img { width: 100%; border-radius: 10px; border: 2px solid var(--dark); }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--dark); border-radius: 8px; font-family: 'Outfit'; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="lobby" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div class="game-panel" style="max-width: 450px;">
        <div class="logo">DUELO CITAÇÕES</div>
        <input type="text" id="room-id" placeholder="CÓDIGO DA SALA">
        <input type="text" id="my-name" placeholder="TEU NOME">
        <button class="btn-pop" style="background: var(--pop-pink); color: white;" onclick="joinRoom()">ENTRAR 👁️</button>
    </div>
</div>

<div id="game-area" class="main-layout" style="display:none;">
    <div class="game-panel">
        <div id="status" class="status-msg">Aguardando jogadores...</div>
        
        <div id="phase-write" style="display:none;">
            <h3>✍️ Escreve uma citação:</h3>
            <textarea id="phrase-input" placeholder="Ex: Um dinossauro mestre de cozinha..." rows="3"></textarea>
            <button class="btn-pop" style="background: var(--pop-teal); color:white;" onclick="submitPhrase()">ENVIAR FRASE</button>
        </div>

        <div id="phase-draw" style="display:none;">
            <p>DESENHA ESTA CITAÇÃO:</p>
            <div id="target-phrase" style="font-size: 1.5em; font-weight: 900; color: var(--pop-pink); margin-bottom: 15px;"></div>
            
            <div class="color-picker">
                <div class="color-btn" style="background: #000000" onclick="changeColor('#000000')"></div>
                <div class="color-btn" style="background: #ff7675" onclick="changeColor('#ff7675')"></div>
                <div class="color-btn" style="background: #74b9ff" onclick="changeColor('#74b9ff')"></div>
                <div class="color-btn" style="background: #55efc4" onclick="changeColor('#55efc4')"></div>
                <div class="color-btn" style="background: #a29bfe" onclick="changeColor('#a29bfe')"></div>
            </div>

            <div id="canvas-container"><canvas id="paintCanvas" width="320" height="280"></canvas></div>
            <button class="btn-pop" onclick="clearCanvas()">LIMPAR</button>
            <button class="btn-pop" style="background: var(--pop-teal); color:white;" onclick="submitDrawing()">ENVIAR DESENHO</button>
        </div>

        <div id="phase-vote" style="display:none;">
            <h3>⭐ QUAL O MELHOR?</h3>
            <div id="vote-gallery"></div>
        </div>

        <div id="phase-results" style="display:none;">
            <h2 id="winner-text"></h2>
            <button class="btn-pop" onclick="location.reload()">NOVO JOGO</button>
        </div>
    </div>

    <div class="side-panel">
        <h3>💬 CHAT OFF</h3>
        <div id="chat-box" class="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Escreve algo...">
        <button class="btn-pop" style="font-size: 0.8em;" onclick="sendChat()">ENVIAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bigbrother-termo",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", myId = "", myName = "";
    let canvas, ctx, drawing = false, currentColor = "#000000";

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        myName = document.getElementById('my-name').value.trim();
        if(!currentRoom || !myName) return alert("Preenche os dados!");
        
        myId = myName.replace(/\s+/g, '_') + "_" + Math.floor(Math.random()*1000);
        
        db.ref('duelo/'+currentRoom+'/players/'+myId).set({ name: myName, score: 0 });
        db.ref('duelo/'+currentRoom+'/players/'+myId).onDisconnect().remove();

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        initCanvas();
        listen();
        listenChat();
    }

    function initCanvas() {
        canvas = document.getElementById('paintCanvas');
        ctx = canvas.getContext('2d');
        ctx.lineWidth = 4; ctx.lineCap = 'round';
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top };
        };
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', (e) => { if(!drawing) return; ctx.strokeStyle = currentColor; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        window.addEventListener('mouseup', () => drawing = false);
    }

    function changeColor(c) { currentColor = c; }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function submitPhrase() {
        const p = document.getElementById('phrase-input').value.trim();
        if(!p) return;
        db.ref('duelo/'+currentRoom+'/phrases/'+myId).set(p);
        document.getElementById('phase-write').style.display = 'none';
    }

    function submitDrawing() {
        const data = canvas.toDataURL();
        db.ref('duelo/'+currentRoom+'/drawings/'+myId).set(data);
        document.getElementById('phase-draw').style.display = 'none';
    }

    function vote(id) {
        db.ref('duelo/'+currentRoom+'/players/'+id+'/score').transaction(s => (s||0)+1);
        db.ref('duelo/'+currentRoom+'/votes/'+myId).set(true);
    }

    function sendChat() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        db.ref('duelo/'+currentRoom+'/chat').push({ name: myName, msg: input.value });
        input.value = "";
    }

    function listenChat() {
        db.ref('duelo/'+currentRoom+'/chat').limitToLast(20).on('value', snap => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                box.innerHTML += `<div><b>${c.val().name}:</b> ${c.val().msg}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function listen() {
        db.ref('duelo/'+currentRoom).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const players = data.players || {};
            const pIds = Object.keys(players);
            const numP = pIds.length;
            const phrases = data.phrases || {};
            const drawings = data.drawings || {};
            const votes = data.votes || {};

            if(Object.keys(phrases).length < numP) {
                document.getElementById('status').innerText = "FASE 1: ESCREVER CITAÇÕES";
                document.getElementById('phase-write').style.display = 'block';
            } 
            else if(Object.keys(drawings).length < numP) {
                document.getElementById('status').innerText = "FASE 2: DESENHAR";
                document.getElementById('phase-write').style.display = 'none';
                document.getElementById('phase-draw').style.display = 'block';
                const myIdx = pIds.indexOf(myId);
                const targetIdx = (myIdx + 1) % numP;
                document.getElementById('target-phrase').innerText = phrases[pIds[targetIdx]];
            }
            else if(Object.keys(votes).length < numP) {
                document.getElementById('status').innerText = "FASE 3: VOTAÇÃO";
                document.getElementById('phase-draw').style.display = 'none';
                document.getElementById('phase-vote').style.display = 'block';
                const gal = document.getElementById('vote-gallery');
                gal.innerHTML = "";
                Object.keys(drawings).forEach(pid => {
                    if(pid !== myId) {
                        gal.innerHTML += `<div class="vote-card"><p>De: ${players[pid].name}</p><img src="${drawings[pid]}"><button class="btn-pop" onclick="vote('${pid}')">VOTAR ⭐</button></div>`;
                    }
                });
            } else {
                document.getElementById('phase-vote').style.display = 'none';
                document.getElementById('phase-results').style.display = 'block';
                let win = ""; let max = -1;
                pIds.forEach(id => { if(players[id].score > max) { max = players[id].score; win = players[id].name; }});
                document.getElementById('winner-text').innerText = `🏆 ${win} GANHOU!`;
            }
        });
    }
</script>
</body>
</html>
