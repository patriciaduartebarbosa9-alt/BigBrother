<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pictionary Pro PT 👁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --pop-bg: #ffb800; --pop-pink: #fd79a8; --pop-teal: #00cec9; --dark: #2d3436; }
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Outfit'; background: var(--pop-bg); color: var(--dark); overflow: hidden; }

        .main-layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; padding: 5px; gap: 5px; }
        @media (min-width: 1024px) { .main-layout { display: grid; grid-template-columns: 200px 1fr 300px; padding: 15px; gap: 15px; } }

        .panel { background: white; border: 3px solid var(--dark); border-radius: 15px; box-shadow: 4px 4px 0 var(--dark); display: flex; flex-direction: column; overflow: hidden; }

        .mobile-header { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--dark); color: white; border-radius: 10px; margin-bottom: 5px; }
        @media (min-width: 1024px) { .mobile-header { display: none; } }

        .game-panel { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; position: relative; }
        .timer { font-size: 1.2em; font-weight: 900; color: var(--pop-pink); background: var(--dark); padding: 2px 12px; border-radius: 20px; }

        #canvas-wrap { flex: 1; width: 100%; max-width: 600px; background: white; border: 3px solid var(--dark); border-radius: 10px; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }

        .controls { width: 100%; display: flex; justify-content: center; gap: 10px; padding: 10px 0; flex-wrap: wrap; align-items: center; }
        .tool-btn { width: 35px; height: 35px; border-radius: 8px; border: 2px solid var(--dark); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .color-btn { width: 25px; height: 25px; border-radius: 50%; border: 2px solid var(--dark); cursor: pointer; }
        .active-tool { transform: scale(1.2); border-color: var(--pop-pink); box-shadow: 0 0 10px var(--pop-pink); }
        
        .sidebar { display: none; }
        @media (min-width: 1024px) { .sidebar { display: flex; } }
        
        #chat-section { height: 180px; }
        @media (min-width: 1024px) { #chat-section { height: auto; flex: 1; } }

        .chat-container { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9em; background: #f9f9f9; }
        .player-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: 700; }
        
        .btn-pop { padding: 8px 15px; border: 2px solid var(--dark); border-radius: 8px; font-weight: 800; background: var(--pop-teal); box-shadow: 2px 2px 0 var(--dark); cursor: pointer; }
        
        .secret-word { font-weight: 900; color: var(--pop-pink); text-transform: uppercase; font-size: 1.2em; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; border: 2px solid var(--dark); border-radius: 10px; font-size: 16px; }

        .hint-text { font-size: 0.8em; color: #666; font-weight: 600; margin-top: 5px; }
    </style>
</head>
<body>

<div id="lobby" style="display:flex; justify-content:center; align-items:center; height:100vh; padding:20px;">
    <div class="panel" style="padding:20px; width:100%; max-width:350px; text-align:center;">
        <h2 style="font-family:Montserrat">PICTIONARY 2.0</h2>
        <input type="text" id="room-id" placeholder="CÓDIGO DA SALA" style="margin-bottom:10px">
        <input type="text" id="my-name" placeholder="TEU NOME">
        <button class="btn-pop" style="width:100%; margin-top:15px; background:var(--pop-pink)" onclick="joinRoom()">ENTRAR</button>
    </div>
</div>

<div id="game-area" class="main-layout" style="display:none;">
    
    <div class="mobile-header">
        <div id="mobile-timer" class="timer">03:00</div>
        <div id="mobile-word" class="secret-word">_ _ _</div>
    </div>

    <div class="panel sidebar">
        <div style="background:var(--dark); color:white; padding:5px; text-align:center; font-size:0.8em;">PLACAR (20 PTS)</div>
        <div id="players-list"></div>
    </div>

    <div class="panel game-panel">
        <div class="sidebar" style="margin-bottom:10px;">
            <div id="timer" class="timer">03:00</div>
        </div>

        <div id="word-box" style="margin-bottom:10px; text-align:center;">
            <span id="role-msg" style="font-size:0.8em; display:block">Adivinha:</span>
            <span id="word-display" class="secret-word">---</span>
            <div id="hint-display" class="hint-text">Aguardando dica...</div>
        </div>

        <div id="canvas-wrap">
            <canvas id="paintCanvas"></canvas>
        </div>

        <div class="controls" id="draw-tools" style="visibility:hidden">
            <div class="color-btn" style="background:#000" onclick="setTool('pen', '#000')"></div>
            <div class="color-btn" style="background:#ff7675" onclick="setTool('pen', '#ff7675')"></div>
            <div class="color-btn" style="background:#74b9ff" onclick="setTool('pen', '#74b9ff')"></div>
            <div id="tool-eraser" class="tool-btn" onclick="setTool('eraser')">🧼</div>
            <button class="btn-pop" onclick="clearCanvas()" style="padding:4px 8px; font-size:10px">LIMPAR TUDO</button>
        </div>
    </div>

    <div class="panel" id="chat-section">
        <div class="chat-container" id="chat-box"></div>
        <div style="padding:5px;">
            <input type="text" id="chat-input" placeholder="Teu palpite...">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bigbrother-termo",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const PALAVRAS = [
        "Torre de Belém", "Ponte 25 de Abril", "Pastel de Nata", "Bacalhau à Brás", 
        "Elétrico de Lisboa", "Galo de Barcelos", "Castelo de Guimarães", 
        "Vinho do Porto", "Francesinha", "Estádio da Luz", "Oceanário", 
        "Pão com Chouriço", "Sardinha Assada", "Arroz Doce", "Fado", "Coração de Viana"
    ];
    
    let currentRoom = "", myId = "", myName = "", isMaster = false;
    let canvas, ctx, drawing = false, currentColor = "#000", currentSize = 5;

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        myName = document.getElementById('my-name').value.trim();
        if(!currentRoom || !myName) return;
        myId = myName.replace(/\s+/g, '_') + "_" + Math.floor(Math.random()*1000);
        
        db.ref('pictionary/'+currentRoom+'/players/'+myId).set({ name: myName, score: 0 });
        db.ref('pictionary/'+currentRoom+'/players/'+myId).onDisconnect().remove();
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = (window.innerWidth >= 1024) ? 'grid' : 'flex';
        
        setupCanvas();
        listen();
    }

    function setupCanvas() {
        canvas = document.getElementById('paintCanvas');
        ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 600;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * (600 / rect.width), y: (clientY - rect.top) * (600 / rect.height) };
        };

        const start = (e) => { 
            if(!isMaster) return; 
            drawing = true; ctx.beginPath(); 
            const p = getPos(e); ctx.moveTo(p.x, p.y); 
            e.preventDefault(); 
        };
        const move = (e) => { 
            if(!drawing || !isMaster) return; 
            const p = getPos(e);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentSize;
            ctx.lineTo(p.x, p.y); ctx.stroke();
            db.ref('pictionary/'+currentRoom+'/drawing').set({ 
                x: p.x, y: p.y, color: currentColor, size: currentSize, end: false, t: Date.now() 
            });
            e.preventDefault(); 
        };
        const stop = () => { drawing = false; db.ref('pictionary/'+currentRoom+'/drawing').set({ end: true, t: Date.now() }); };

        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start, {passive: false}); canvas.addEventListener('touchmove', move, {passive: false}); canvas.addEventListener('touchend', stop);
    }

    function setTool(type, color) {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-tool'));
        if(type === 'eraser') {
            currentColor = "#ffffff";
            currentSize = 20;
            document.getElementById('tool-eraser').classList.add('active-tool');
        } else {
            currentColor = color;
            currentSize = 5;
        }
    }

    function clearCanvas() { db.ref('pictionary/'+currentRoom+'/clear').set(Date.now()); }

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const val = e.target.value.toLowerCase().trim();
            if(!val) return;
            db.ref('pictionary/'+currentRoom+'/lastGuess').set({ name: myName, msg: val, id: myId, t: Date.now() });
            e.target.value = "";
        }
    });

    function listen() {
        db.ref('pictionary/'+currentRoom+'/drawing').on('value', snap => {
            if(isMaster) return;
            const d = snap.val(); if(!d) return;
            if(d.end) { ctx.beginPath(); return; }
            ctx.strokeStyle = d.color; ctx.lineWidth = d.size;
            ctx.lineTo(d.x, d.y); ctx.stroke();
        });

        db.ref('pictionary/'+currentRoom+'/clear').on('value', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
        });

        db.ref('pictionary/'+currentRoom).on('value', snap => {
            const data = snap.val() || {};
            const players = data.players || {};
            const pIds = Object.keys(players).sort();
            if(pIds.length < 2) return;

            const list = document.getElementById('players-list'); list.innerHTML = "";
            pIds.forEach(id => {
                list.innerHTML += `<div class="player-item">${players[id].name} <span>${players[id].score || 0}</span></div>`;
                if((players[id].score || 0) >= 20) {
                    alert(players[id].name + " VENCEU!");
                    db.ref('pictionary/'+currentRoom).remove(); location.reload();
                }
            });

            const round = data.round || 0;
            const mId = pIds[round % pIds.length];
            isMaster = (myId === mId);

            document.getElementById('draw-tools').style.visibility = isMaster ? 'visible' : 'hidden';
            
            if(isMaster && !data.word) {
                const word = PALAVRAS[Math.floor(Math.random()*PALAVRAS.length)];
                db.ref('pictionary/'+currentRoom+'/word').set(word);
                db.ref('pictionary/'+currentRoom+'/startTime').set(Date.now());
            }

            // Sistema de Mascarar Palavra e Dicas
            if(data.word) {
                const word = data.word;
                const startTime = data.startTime;
                const elapsed = (Date.now() - startTime) / 1000;
                
                let display = "";
                // Mascarar: mantém espaços, mostra letras se o tempo passar
                for(let i=0; i<word.length; i++) {
                    if(word[i] === " ") display += "  ";
                    else if(isMaster || elapsed > 60 && i % 3 === 0 || elapsed > 120 && i % 2 === 0) display += word[i] + " ";
                    else display += "_ ";
                }
                
                document.getElementById('word-display').innerText = display;
                document.getElementById('mobile-word').innerText = display;
                document.getElementById('hint-display').innerText = elapsed > 60 ? "Dica: Algumas letras reveladas!" : "Próxima dica em " + Math.max(0, Math.floor(60-elapsed)) + "s";
            }

            if(data.startTime) {
                const diff = Math.floor((Date.now() - data.startTime) / 1000);
                const rem = Math.max(0, 180 - diff);
                const tStr = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
                document.getElementById('timer').innerText = tStr;
                document.getElementById('mobile-timer').innerText = tStr;
                if(rem === 0 && isMaster) nextRound();
            }
        });

        db.ref('pictionary/'+currentRoom+'/lastGuess').on('value', snap => {
            const g = snap.val(); if(!g) return;
            db.ref('pictionary/'+currentRoom+'/word').get().then(wSnap => {
                const secret = wSnap.val();
                if(!secret) return;
                const isCorrect = (g.msg.toLowerCase() === secret.toLowerCase());
                const box = document.getElementById('chat-box');
                const div = document.createElement('div');
                div.innerHTML = `<b>${g.name}:</b> ${isCorrect ? '<span style="color:green">ACERTOU!</span>' : g.msg}`;
                box.appendChild(div); box.scrollTop = box.scrollHeight;

                if(isCorrect && isMaster) {
                    db.ref('pictionary/'+currentRoom+'/players/'+g.id+'/score').transaction(s => (s||0)+1);
                    db.ref('pictionary/'+currentRoom+'/players/'+myId+'/score').transaction(s => (s||0)+1);
                    setTimeout(nextRound, 1000);
                }
            });
        });
    }

    function nextRound() {
        db.ref('pictionary/'+currentRoom+'/round').transaction(r => (r||0)+1);
        db.ref('pictionary/'+currentRoom+'/word').remove();
        db.ref('pictionary/'+currentRoom+'/clear').set(Date.now());
    }
</script>
</body>
</html>
