<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>BB Online 👁️</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --pop-bg: #ffb800; --pop-purple: #a29bfe; --pop-teal: #00cec9;
            --pop-pink: #fd79a8; --pop-lime: #badc58; --dark: #2d3436;
        }

        body { 
            font-family: 'Outfit', sans-serif; background: var(--pop-bg); 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; color: var(--dark);
        }

        .panel { 
            background: white; padding: 30px; border-radius: 30px; 
            border: 6px solid var(--dark); box-shadow: 10px 10px 0 var(--dark);
            text-align: center; max-width: 450px; width: 90%; margin: 20px 0;
        }

        .logo-pop {
            font-family: 'Montserrat'; font-size: 2.5em; color: white;
            -webkit-text-stroke: 2px var(--dark); filter: drop-shadow(4px 4px 0 var(--pop-pink));
            margin-bottom: 20px; text-transform: uppercase;
        }

        /* Estilo da Voz / Apresentador */
        .host-area {
            display: flex; align-items: center; background: var(--dark); 
            color: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; gap: 15px;
        }
        .host-icon { font-size: 30px; background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }

        input {
            width: 100%; padding: 15px; margin: 10px 0; border: 4px solid var(--dark);
            border-radius: 12px; font-weight: 800; box-sizing: border-box; font-family: 'Outfit';
        }

        .btn-pop {
            width: 100%; padding: 15px; background: var(--pop-pink); color: white;
            border: 4px solid var(--dark); border-radius: 15px; font-weight: 900;
            cursor: pointer; box-shadow: 5px 5px 0 var(--dark); transition: 0.1s;
            text-transform: uppercase; margin-top: 10px;
        }

        .btn-pop:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--dark); }

        #players-grid { display: flex; gap: 10px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .card { 
            background: var(--pop-lime); padding: 12px; border: 4px solid var(--dark); 
            border-radius: 15px; width: 90px; box-shadow: 4px 4px 0 var(--dark); 
        }
        .card.active { background: white; transform: scale(1.1); border-color: var(--pop-teal); border-style: dashed; }

        .how-to { font-size: 0.85em; background: #f0f0f0; padding: 15px; border-radius: 15px; border: 2px solid var(--dark); text-align: left; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="lobby" class="panel">
        <div class="logo-pop">BBB Term-O</div>
        
        <div class="how-to">
            <b>COMO JOGAR:</b><br>
            • Entra na mesma sala que os teus amigos.<br>
            • No teu turno, escolhe uma ação.<br>
            • <b>Objetivo:</b> Ser o mais popular de Portugal! 👁️🇵🇹
        </div>

        <input type="text" id="room-id" placeholder="NOME DA SALA (ex: casa1)">
        <input type="text" id="my-name" placeholder="TEU NOME">
        <button class="btn-pop" onclick="joinRoom()">ENTRAR NA CASA 👁️</button>
    </div>

    <div id="game-room" class="panel" style="display:none;">
        <div class="host-area">
            <div class="host-icon">👁️</div>
            <div id="host-msg" style="font-size: 0.9em; font-weight: 600;">"Olá Portugal! Quem será o próximo a sair?"</div>
        </div>

        <div id="status" style="font-weight: 900; margin-bottom: 20px; font-size: 1.1em; text-transform: uppercase;">A carregar...</div>
        
        <div id="players-grid"></div>
        
        <div id="controls" style="display:none; margin-top: 20px;">
            <button class="btn-pop" onclick="sendAction('conversar')">💬 CONVERSAR (+10 Pop)</button>
            <button class="btn-pop" style="background: var(--pop-purple)" onclick="sendAction('treta')">🔥 CRIAR TRETA (-15 Pop)</button>
            <button class="btn-pop" style="background: var(--pop-teal)" onclick="sendAction('sorte')">🎁 CAIXA MISTÉRIO (?)</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        projectId: "bigbrother-termo",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app", 
        storageBucket: "bigbrother-termo.firebasestorage.app",
        messagingSenderId: "470183788507",
        appId: "1:470183788507:web:9c186b3dd6f5ce90b6f1fe"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", myId = "";

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        const name = document.getElementById('my-name').value.trim();
        if(!currentRoom || !name) return alert("Preenche os campos!");

        myId = name + "_" + Math.floor(Math.random()*1000);
        db.ref('rooms/' + currentRoom + '/players/' + myId).set({ name: name, pop: 50 });
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-room').style.display = 'block';
        listen();
    }

    // Limpa o jogador da base de dados quando ele fecha a aba ou sai da página
window.addEventListener('beforeunload', function() {
    if (currentRoom && myId) {
        db.ref('rooms/' + currentRoom + '/players/' + myId).remove();
    }
});

    function listen() {
        db.ref('rooms/' + currentRoom).on('value', (snap) => {
            const data = snap.val();
            if(!data || !data.players) return;

            const grid = document.getElementById('players-grid');
            grid.innerHTML = "";
            const ids = Object.keys(data.players);
            const turn = data.turn || ids[0];

            ids.forEach(id => {
                const p = data.players[id];
                const isActive = (id === turn) ? 'active' : '';
                grid.innerHTML += `
                    <div class="card ${isActive}">
                        <div style="font-size: 1.2em">👤</div>
                        <b style="display:block; font-size: 0.9em;">${p.name}</b>
                        <span style="font-size: 0.8em">${p.pop}%</span>
                    </div>`;
            });

            document.getElementById('controls').style.display = (turn === myId) ? 'block' : 'none';
            document.getElementById('status').innerText = (turn === myId) ? "É A TUA VEZ!" : "Vez de " + data.players[turn].name;
            document.getElementById('status').style.color = (turn === myId) ? "var(--pop-pink)" : "var(--dark)";
            
            if(data.lastMsg) document.getElementById('host-msg').innerText = data.lastMsg;
        });
    }

    function sendAction(act) {
        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const ids = Object.keys(data.players);
            const next = ids[(ids.indexOf(myId) + 1) % ids.length];
            
            let popChange = 0;
            let msg = "";

            if(act === 'conversar') {
                popChange = 10;
                msg = `"${data.players[myId].name} está a conquistar Portugal!"`;
            } else if(act === 'treta') {
                popChange = -15;
                msg = `"A casa está a ferro e fogo com ${data.players[myId].name}!"`;
            } else if(act === 'sorte') {
                const sorte = Math.random() > 0.5;
                popChange = sorte ? 20 : -20;
                msg = sorte ? `"A VOZ deu um bónus a ${data.players[myId].name}!"` : `"Má sorte! ${data.players[myId].name} foi castigado!"`;
            }

            const updates = {};
            updates['/players/' + myId + '/pop'] = data.players[myId].pop + popChange;
            updates['/turn'] = next;
            updates['/lastMsg'] = msg;

            db.ref('rooms/' + currentRoom).update(updates);
        });
    }
</script>
</body>
</html>
