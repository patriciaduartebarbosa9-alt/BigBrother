<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>BB Duelo Artístico 👁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --pop-bg: #ffb800; --pop-pink: #fd79a8; --pop-teal: #00cec9; --dark: #2d3436; }
        body { font-family: 'Outfit'; background: var(--pop-bg); margin: 0; min-height: 100vh; color: var(--dark); }
        
        .main-container { display: flex; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .side-panel { background: white; padding: 20px; border-radius: 20px; border: 4px solid var(--dark); box-shadow: 6px 6px 0 var(--dark); flex: 1; min-width: 250px; height: fit-content; }
        .game-panel { flex: 2; min-width: 350px; background: white; padding: 30px; border-radius: 30px; border: 6px solid var(--dark); box-shadow: 10px 10px 0 var(--dark); text-align: center; }
        
        .logo { font-family: 'Montserrat'; font-size: 2.2em; -webkit-text-stroke: 1.5px var(--dark); color: white; filter: drop-shadow(3px 3px 0 var(--pop-pink)); margin-bottom: 15px; text-transform: uppercase; }
        .btn-pop { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; border: 3px solid var(--dark); font-weight: 900; cursor: pointer; box-shadow: 3px 3px 0 var(--dark); text-transform: uppercase; transition: 0.1s; }
        .btn-pop:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--dark); }
        
        .color-picker { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 3px solid var(--dark); cursor: pointer; transition: 0.2s; }
        
        #canvas-container { background: white; border: 3px solid var(--dark); border-radius: 15px; padding: 10px; margin: 10px 0; display: inline-block; }
        canvas { background: #fff; cursor: crosshair; touch-action: none; display: block; }
        
        .drawing-card { border: 4px solid var(--dark); margin: 10px; padding: 15px; border-radius: 20px; background: #fff; box-shadow: 4px 4px 0 var(--dark); }
        .drawing-card img { width: 200px; height: 200px; border-radius: 10px; border: 2px solid var(--dark); display: block; margin: 0 auto 10px auto; }
        
        .card { background: #badc58; padding: 10px; border: 3px solid var(--dark); border-radius: 15px; width: 100px; text-align: center; }
        .card.active { border-color: var(--pop-pink); background: white; transform: scale(1.05); box-shadow: 0 0 15px var(--pop-pink); }
        
        .rp-display { background: #fff3cd; border: 3px dashed var(--dark); padding: 20px; border-radius: 15px; margin: 15px 0; font-style: italic; font-weight: 600; }
        .chat-box { height: 250px; overflow-y: auto; background: #f9f9f9; border: 2px solid var(--dark); border-radius: 10px; padding: 10px; text-align: left; }
        textarea { width: 100%; padding: 12px; border: 2px solid var(--dark); border-radius: 8px; font-family: 'Outfit'; resize: none; }
    </style>
</head>
<body>

    <div id="lobby" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
        <div class="game-panel" style="max-width: 500px;">
            <div class="logo">BB DUELO RP</div>
            <p>20 Rodadas • Duelo de Desenho e Pontos ⭐</p>
            <input type="text" id="room-id" style="width:100%; padding:12px; margin-bottom:10px;" placeholder="CÓDIGO DA SALA (ex: duelo1)">
            <input type="text" id="my-name" style="width:100%; padding:12px; margin-bottom:10px;" placeholder="TEU NOME">
            <button class="btn-pop" style="background: var(--pop-pink); color: white;" onclick="joinRoom()">ENTRAR NO DUELO 👁️</button>
        </div>
    </div>

    <div id="game-room" style="display:none;" class="main-container">
        <div class="side-panel">
            <h3>👥 PLACAR</h3>
            <div id="players-grid" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;"></div>
        </div>

        <div class="game-panel">
            <div id="day-counter" style="font-weight: 900; font-size: 1.5em; color: var(--pop-pink);">RODADA 1 / 20</div>
            <div class="rp-display" id="last-rp-action">A Voz: Bem-vindos ao duelo!</div>

            <div id="drawing-zone" style="display:none;">
                <h3>🎨 A TUA VEZ DE DESENHAR!</h3>
                <div class="color-picker">
                    <div class="color-btn" style="background: #000000" onclick="changeColor('#000000')"></div>
                    <div class="color-btn" style="background: #ff7675" onclick="changeColor('#ff7675')"></div>
                    <div class="color-btn" style="background: #74b9ff" onclick="changeColor('#74b9ff')"></div>
                    <div class="color-btn" style="background: #55efc4" onclick="changeColor('#55efc4')"></div>
                    <div class="color-btn" style="background: #a29bfe" onclick="changeColor('#a29bfe')"></div>
                </div>
                <div id="canvas-container"><canvas id="paintCanvas" width="250" height="250"></canvas></div>
                <button class="btn-pop" onclick="clearCanvas()">LIMPAR</button>
                <button class="btn-pop" style="background:var(--pop-teal); color:white;" onclick="saveDrawing()">ENVIAR DESENHO ⭐</button>
            </div>

            <div id="gallery-zone" style="display:none;">
                <h3>🖼️ VOTA NO DESENHO DO RIVAL</h3>
                <div id="drawings-display"></div>
            </div>

            <div id="controls" style="display:none;">
                <div id="normal-actions">
                    <textarea id="rp-text" placeholder="Escreve a tua ação de RP..." rows="3"></textarea>
                    <button class="btn-pop" style="background: var(--pop-teal); color: white;" onclick="sendRP()">PUBLICAR AÇÃO 🎬</button>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <h3>💬 CHAT OFF</h3>
            <div id="chat-box" class="chat-box"></div>
            <input type="text" id="chat-input" style="width:100%; padding:10px; margin: 10px 0;" placeholder="Conversar...">
            <button class="btn-pop" onclick="sendChat()">ENVIAR</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        projectId: "bigbrother-termo",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", myId = "", myName = "";
    let canvas, ctx, drawing = false;
    let currentColor = "#000000";

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        myName = document.getElementById('my-name').value.trim();
        if(!currentRoom || !myName) return alert("Preenche os dados!");
        
        myId = myName.replace(/\s+/g, '_') + "_" + Math.floor(Math.random()*1000);
        const roomRef = db.ref('rooms/' + currentRoom);

        roomRef.get().then(snap => {
            if (!snap.exists()) {
                roomRef.set({ round: 1, turn: myId, lastRP: "A VOZ: Duelo artístico começou!" });
            }
            db.ref('rooms/' + currentRoom + '/players/' + myId).set({ name: myName, points: 0 });
            db.ref('rooms/' + currentRoom + '/players/' + myId).onDisconnect().remove();

            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-room').style.display = 'flex';
            initCanvas();
            listen();
            listenChat();
        });
    }

    function initCanvas() {
        canvas = document.getElementById('paintCanvas');
        ctx = canvas.getContext('2d');
        ctx.lineWidth = 4; ctx.lineCap = 'round';
        
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top };
        };
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', (e) => { 
            if(!drawing) return; 
            ctx.strokeStyle = currentColor;
            const p = getP(e); 
            ctx.lineTo(p.x, p.y); 
            ctx.stroke(); 
        });
        window.addEventListener('mouseup', () => drawing = false);
    }

    function changeColor(c) { currentColor = c; }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function listen() {
        db.ref('rooms/' + currentRoom).on('value', (snap) => {
            const data = snap.val();
            if(!data || !data.players) return;

            const players = data.players;
            const round = data.round || 1;
            const turn = data.turn;

            if(round > 20) {
                let winner = ""; let max = -1;
                Object.values(players).forEach(p => { if((p.points||0) > max){ max = p.points; winner = p.name; }});
                alert("🏆 FIM DO JOGO! Vencedor: " + winner + " com " + max + " pontos!");
                db.ref('rooms/' + currentRoom).remove();
                location.reload(); return;
            }

            document.getElementById('day-counter').innerText = `RODADA ${round} / 20`;
            document.getElementById('last-rp-action').innerHTML = data.lastRP || "";

            const grid = document.getElementById('players-grid');
            grid.innerHTML = "";
            Object.keys(players).forEach(id => {
                grid.innerHTML += `<div class="card ${id === turn ? 'active' : ''}"><b>${players[id].name}</b><br>⭐ ${players[id].points || 0}</div>`;
            });

            const isMyTurn = (turn === myId);
            const isDrawingRound = (round % 2 === 0);

            document.getElementById('controls').style.display = isMyTurn ? 'block' : 'none';
            document.getElementById('normal-actions').style.display = (!isDrawingRound && isMyTurn) ? 'block' : 'none';
            document.getElementById('drawing-zone').style.display = (isDrawingRound && isMyTurn) ? 'block' : 'none';
            
            const gallery = document.getElementById('gallery-zone');
            if(data.drawings && !isMyTurn) {
                gallery.style.display = 'block';
                const disp = document.getElementById('drawings-display');
                disp.innerHTML = "";
                Object.keys(data.drawings).forEach(pid => {
                    if(pid !== myId) {
                        disp.innerHTML += `<div class="drawing-card"><img src="${data.drawings[pid]}"><button class="btn-pop" style="background:#badc58" onclick="voteDrawing('${pid}')">DAR PONTO ⭐</button></div>`;
                    }
                });
            } else { gallery.style.display = 'none'; }
        });
    }

    function sendRP() {
        const txt = document.getElementById('rp-text').value;
        if(!txt) return;
        updateTurn(`🎭 <b>${myName}:</b> "${txt}"`, false);
        document.getElementById('rp-text').value = "";
    }

    function saveDrawing() {
        const url = canvas.toDataURL();
        db.ref('rooms/' + currentRoom + '/drawings/' + myId).set(url).then(() => {
            updateTurn(`🎨 ${myName} enviou um desenho! Oponente, podes votar?`, true);
            clearCanvas();
        });
    }

    function voteDrawing(pid) {
        db.ref('rooms/' + currentRoom + '/players/' + pid + '/points').transaction(p => (p || 0) + 10);
        db.ref('rooms/' + currentRoom + '/drawings').remove();
        alert("Voto registado!");
    }

    function updateTurn(msg, keepDrawings) {
        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const ids = Object.keys(data.players);
            const idx = ids.indexOf(myId);
            const nextIdx = (idx + 1) % ids.length;
            
            let up = {
                turn: ids[nextIdx],
                lastRP: msg,
                round: nextIdx === 0 ? (data.round + 1) : data.round
            };
            if(!keepDrawings) up.drawings = null;
            db.ref('rooms/' + currentRoom).update(up);
        });
    }

    function sendChat() {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        db.ref('rooms/' + currentRoom + '/chat').push({ name: myName, msg: i.value });
        i.value = "";
    }

    function listenChat() {
        db.ref('rooms/' + currentRoom + '/chat').limitToLast(10).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = "";
            s.forEach(c => { b.innerHTML += `<div><b>${c.val().name}:</b> ${c.val().msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    }
</script>
</body>
</html>
