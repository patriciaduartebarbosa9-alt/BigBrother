<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>BBB Term-O: Portugal Edition 👁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --pop-bg: #ffb800; --pop-pink: #fd79a8; --pop-teal: #00cec9; --dark: #2d3436; --dead: #636e72; }
        body { font-family: 'Outfit'; background: var(--pop-bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .panel { background: white; padding: 30px; border-radius: 30px; border: 6px solid var(--dark); box-shadow: 10px 10px 0 var(--dark); text-align: center; width: 90%; max-width: 500px; }
        .logo { font-family: 'Montserrat'; font-size: 2.5em; -webkit-text-stroke: 2px var(--dark); color: white; filter: drop-shadow(4px 4px 0 var(--pop-pink)); }
        
        .card { background: #badc58; padding: 10px; border: 3px solid var(--dark); border-radius: 15px; width: 80px; position: relative; }
        .card.active { border-color: var(--pop-pink); transform: scale(1.1); background: white; }
        .card.eliminated { background: var(--dead) !important; opacity: 0.5; filter: grayscale(1); }
        .card.eliminated::after { content: "❌"; position: absolute; top: 5px; right: 5px; }

        .btn-pop { width: 100%; padding: 15px; margin-top: 10px; border-radius: 15px; border: 4px solid var(--dark); font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0 var(--dark); text-transform: uppercase; }
        .vote-btn { background: var(--pop-pink); color: white; font-size: 0.8em; padding: 5px; margin-top: 5px; }
        
        .host-msg { background: var(--dark); color: white; padding: 15px; border-radius: 15px; margin: 15px 0; font-size: 0.9em; min-height: 40px; }
    </style>
</head>
<body>

    <div id="lobby" class="panel">
        <div class="logo">BBB TERMO</div>
        <input type="text" id="room-id" placeholder="CÓDIGO DA SALA" style="width:100%; padding:15px; margin: 10px 0; box-sizing: border-box; border: 3px solid var(--dark); border-radius: 10px;">
        <input type="text" id="my-name" placeholder="TEU NOME" style="width:100%; padding:15px; margin-bottom: 10px; box-sizing: border-box; border: 3px solid var(--dark); border-radius: 10px;">
        <button class="btn-pop" style="background: var(--pop-pink); color: white;" onclick="joinRoom()">Entrar na Casa 👁️</button>
    </div>

    <div id="game-room" class="panel" style="display:none;">
        <div id="day-counter" style="font-weight: 900; font-size: 1.2em;">DIA 1</div>
        <div class="host-msg" id="host-msg">"A VOZ: Bem-vindos a Portugal!"</div>
        
        <div id="players-grid" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>

        <div id="controls" style="display:none; margin-top: 20px;">
            <div id="normal-actions">
                <button class="btn-pop" style="background: #fff;" onclick="sendAction('conversar')">💬 Conversar (+10 Pop)</button>
                <button class="btn-pop" style="background: var(--pop-teal);" onclick="sendAction('treta')">🔥 Treta (-15 Pop)</button>
            </div>
            <div id="nomination-actions" style="display:none;">
                <p><b>HORA DAS NOMEAÇÕES!</b> Escolhe alguém para sair:</p>
                <div id="vote-targets"></div>
            </div>
        </div>
        <div id="spectator-msg" style="display:none; color: red; font-weight: 800; margin-top: 20px;">
            ESTÁS ELIMINADO! Podes apenas observar. 👁️
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        projectId: "bigbrother-termo",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "bigbrother-termo.firebasestorage.app",
        messagingSenderId: "470183788507",
        appId: "1:470183788507:web:9c186b3dd6f5ce90b6f1fe"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", myId = "";

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        const name = document.getElementById('my-name').value.trim();
        if(!currentRoom || !name) return;
        myId = name + "_" + Math.floor(Math.random()*1000);
        db.ref('rooms/' + currentRoom + '/players/' + myId).set({ name: name, pop: 50, status: 'playing', votes: 0 });
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-room').style.display = 'block';
        listen();
    }

    function listen() {
        db.ref('rooms/' + currentRoom).on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            const players = data.players;
            const ids = Object.keys(players);
            const aliveIds = ids.filter(id => players[id].status === 'playing');
            const day = data.day || 1;
            const turn = data.turn || aliveIds[0];
            const phase = data.phase || 'normal';

            document.getElementById('day-counter').innerText = `DIA ${day}`;
            document.getElementById('host-msg').innerText = data.lastMsg || "A VOZ está a observar...";

            // Atualizar Grid
            const grid = document.getElementById('players-grid');
            grid.innerHTML = "";
            ids.forEach(id => {
                const p = players[id];
                grid.innerHTML += `
                    <div class="card ${id === turn ? 'active' : ''} ${p.status === 'eliminated' ? 'eliminated' : ''}">
                        <b>${p.name}</b><br>${p.pop}%
                    </div>`;
            });

            // Lógica de Visibilidade
            const isEliminated = players[myId].status === 'eliminated';
            document.getElementById('spectator-msg').style.display = isEliminated ? 'block' : 'none';
            
            if (!isEliminated && turn === myId) {
                document.getElementById('controls').style.display = 'block';
                if (phase === 'nomination') {
                    document.getElementById('normal-actions').style.display = 'none';
                    document.getElementById('nomination-actions').style.display = 'block';
                    const targets = document.getElementById('vote-targets');
                    targets.innerHTML = "";
                    aliveIds.forEach(id => {
                        if(id !== myId) targets.innerHTML += `<button class="btn-pop vote-btn" onclick="vote('${id}')">Votar em ${players[id].name}</button>`;
                    });
                } else {
                    document.getElementById('normal-actions').style.display = 'block';
                    document.getElementById('nomination-actions').style.display = 'none';
                }
            } else {
                document.getElementById('controls').style.display = 'none';
            }
        });
    }

    function sendAction(act) {
        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const players = data.players;
            const aliveIds = Object.keys(players).filter(id => players[id].status === 'playing');
            const currentIndex = aliveIds.indexOf(myId);
            const isLastPlayer = currentIndex === aliveIds.length - 1;
            
            let newDay = data.day || 1;
            let nextPhase = data.phase || 'normal';
            let msg = "";
            let popChange = act === 'conversar' ? 10 : -15;

            if (isLastPlayer) {
                newDay++;
                if (newDay % 4 === 0 && aliveIds.length > 2) {
                    nextPhase = 'nomination';
                    msg = "A VOZ: Chegou a hora das NOMEAÇÕES! Escolham com sabedoria.";
                } else if (aliveIds.length <= 2 && newDay > 1) {
                    msg = "A VOZ: ESTAMOS NA GRANDE FINAL!";
                }
            }

            const updates = {};
            updates['/players/' + myId + '/pop'] = players[myId].pop + popChange;
            updates['/turn'] = aliveIds[(currentIndex + 1) % aliveIds.length];
            updates['/day'] = newDay;
            updates['/phase'] = nextPhase;
            if(msg) updates['/lastMsg'] = msg;
            
            db.ref('rooms/' + currentRoom).update(updates);
        });
    }

    function vote(targetId) {
        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const aliveIds = Object.keys(data.players).filter(id => data.players[id].status === 'playing');
            const currentIndex = aliveIds.indexOf(myId);
            const isLastVote = currentIndex === aliveIds.length - 1;

            let updates = {};
            updates[`/players/${targetId}/votes`] = (data.players[targetId].votes || 0) + 1;
            
            if (isLastVote) {
                // Calcular quem sai (mais votos ou menor pop se empatar)
                let mostVotes = -1;
                let victimId = "";
                aliveIds.forEach(id => {
                    let vCount = data.players[id].votes || 0;
                    if(id === targetId) vCount++; // conta o voto atual
                    if (vCount > mostVotes) {
                        mostVotes = vCount;
                        victimId = id;
                    }
                });

                updates['/players/' + victimId + '/status'] = 'eliminated';
                updates['/phase'] = 'normal';
                updates['/lastMsg'] = `A VOZ: ${data.players[victimId].name} foi expulso da casa!`;
                // Reset de votos
                aliveIds.forEach(id => updates[`/players/${id}/votes`] = 0);
            }

            updates['/turn'] = aliveIds[(currentIndex + 1) % aliveIds.length];
            db.ref('rooms/' + currentRoom).update(updates);
        });
    }
</script>
</body>
</html>
