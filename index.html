<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>BBB RP Portugal 👁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --pop-bg: #ffb800; --pop-pink: #fd79a8; --pop-teal: #00cec9; --dark: #2d3436; }
        body { font-family: 'Outfit'; background: var(--pop-bg); margin: 0; min-height: 100vh; color: var(--dark); }
        #canvas-container { background: white; border: 3px solid var(--dark); border-radius: 15px; padding: 10px; margin: 10px 0; }
        canvas { background: #fff; border: 1px solid #000; cursor: crosshair; touch-action: none; display: block; margin: 0 auto; }
        .drawing-card { border: 2px solid var(--dark); margin: 5px; padding: 5px; border-radius: 10px; display: inline-block; background: white; }
        .drawing-card img { width: 150px; height: 150px; display: block; border-radius: 5px; }
        .main-container { display: flex; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .side-panel { background: white; padding: 20px; border-radius: 20px; border: 4px solid var(--dark); box-shadow: 6px 6px 0 var(--dark); flex: 1; min-width: 250px; height: fit-content; }
        .game-panel { flex: 2; min-width: 350px; background: white; padding: 30px; border-radius: 30px; border: 6px solid var(--dark); box-shadow: 10px 10px 0 var(--dark); text-align: center; }
        .logo { font-family: 'Montserrat'; font-size: 2.2em; -webkit-text-stroke: 1.5px var(--dark); color: white; filter: drop-shadow(3px 3px 0 var(--pop-pink)); margin-bottom: 15px; text-transform: uppercase; }
        .btn-pop { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; border: 3px solid var(--dark); font-weight: 900; cursor: pointer; box-shadow: 3px 3px 0 var(--dark); text-transform: uppercase; transition: 0.1s; }
        .btn-pop:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--dark); }
        .chat-box { height: 350px; overflow-y: auto; background: #f9f9f9; border: 2px solid var(--dark); border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: left; font-size: 0.9em; }
        .card { background: #badc58; padding: 10px; border: 3px solid var(--dark); border-radius: 15px; width: 85px; text-align: center; transition: 0.3s; font-size: 0.8em; }
        .card.active { border-color: var(--pop-pink); background: white; transform: scale(1.1); box-shadow: 0 0 15px var(--pop-pink); }
        .card.eliminated { background: #636e72 !important; opacity: 0.5; filter: grayscale(1); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--dark); border-radius: 8px; box-sizing: border-box; font-family: 'Outfit'; font-weight: 600; }
        .rp-display { background: #fff3cd; border: 3px dashed var(--dark); padding: 20px; border-radius: 15px; margin: 15px 0; font-style: italic; font-weight: 600; min-height: 50px; }
    </style>
</head>
<body>

    <div id="lobby" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
        <div class="game-panel" style="max-width: 500px;">
            <div class="logo">BBB RP PORTUGAL</div>
            <input type="text" id="room-id" placeholder="CÓDIGO DA SALA">
            <input type="text" id="my-name" placeholder="TEU NOME">
            <button class="btn-pop" style="background: var(--pop-pink); color: white;" onclick="joinRoom()">ENTRAR NA CASA 👁️</button>
        </div>
    </div>

    <div id="game-room" style="display:none;" class="main-container">
        <div class="side-panel">
            <h3>📖 INFO</h3>
            <p id="info-status">A aguardar...</p>
        </div>

        <div class="game-panel">
            <div id="day-counter" style="font-weight: 900; font-size: 1.5em; color: var(--pop-pink);">DIA 1</div>
            <div class="rp-display" id="last-rp-action">"Bem-vindos à casa!"</div>
            <div id="players-grid" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px;"></div>

            <div id="drawing-zone" style="display:none;">
                <h3>🎨 DESENHA O TEU DIA</h3>
                <div id="canvas-container"><canvas id="paintCanvas" width="250" height="250"></canvas></div>
                <button class="btn-pop" onclick="clearCanvas()">LIMPAR</button>
                <button class="btn-pop" style="background:var(--pop-teal); color:white;" onclick="saveDrawing()">ENVIAR DESENHO</button>
            </div>

            <div id="gallery-zone" style="display:none;">
                <h3>🖼️ VOTA NO MELHOR DESENHO</h3>
                <div id="drawings-display"></div>
            </div>

            <div id="controls" style="display:none;">
                <div id="normal-actions">
                    <textarea id="rp-text" placeholder="Escreve a tua ação..." rows="3"></textarea>
                    <button class="btn-pop" style="background: var(--pop-teal); color: white;" onclick="sendRP()">PUBLICAR AÇÃO 🎬</button>
                </div>
                <div id="nomination-actions" style="display:none;">
                    <p style="color: red; font-weight: 800;">🔴 NOMEAÇÕES!</p>
                    <div id="vote-targets"></div>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <h3>💬 CHAT</h3>
            <div id="chat-box" class="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Fala aqui...">
            <button class="btn-pop" style="background: var(--pop-teal); color: white;" onclick="sendChat()">ENVIAR</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        projectId: "bigbrother-termo",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "bigbrother-termo.firebasestorage.app",
        messagingSenderId: "470183788507",
        appId: "1:470183788507:web:9c186b3dd6f5ce90b6f1fe"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", myId = "", myName = "";
    let canvas, ctx, drawing = false;

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        myName = document.getElementById('my-name').value.trim();
        if(!currentRoom || !myName) return alert("Preenche os campos!");
        myId = myName.replace(/\s+/g, '_') + "_" + Math.floor(Math.random()*1000);
        
        const roomRef = db.ref('rooms/' + currentRoom);
        roomRef.get().then(snap => {
            const data = snap.val();
            if (!data || !data.turn) {
                roomRef.update({ turn: myId, day: 1, phase: 'normal' });
            }
            roomRef.child('players/' + myId).set({ 
                name: myName, pop: 50, status: 'playing', votes: 0, immune: false 
            });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-room').style.display = 'flex';
            initCanvas();
            listen();
            listenChat();
        });
    }

    function initCanvas() {
        canvas = document.getElementById('paintCanvas');
        if(!canvas) return;
        ctx = canvas.getContext('2d');
        const start = (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); };
        const move = (e) => { if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
        const stop = () => { drawing = false; };
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top };
        };
        canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start);
        canvas.addEventListener('mousemove', move); canvas.addEventListener('touchmove', move);
        canvas.addEventListener('mouseup', stop); canvas.addEventListener('touchend', stop);
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function saveDrawing() {
        const url = canvas.toDataURL();
        db.ref('rooms/' + currentRoom + '/drawings/' + myId).set(url).then(() => {
            sendRP("Enviou um desenho!", true);
        });
    }

    function listen() {
        db.ref('rooms/' + currentRoom).on('value', (snap) => {
            const data = snap.val();
            if(!data || !data.players) return;

            const players = data.players;
            const aliveIds = Object.keys(players).filter(id => players[id].status === 'playing');
            const day = data.day || 1;
            const phase = data.phase || 'normal';
            const turn = data.turn || aliveIds[0];

            document.getElementById('day-counter').innerText = `DIA ${day}`;
            if(data.lastRP) document.getElementById('last-rp-action').innerHTML = data.lastRP;

            // Zonas
            document.getElementById('drawing-zone').style.display = (day === 2 && turn === myId) ? 'block' : 'none';
            document.getElementById('gallery-zone').style.display = (day === 3) ? 'block' : 'none';
            document.getElementById('normal-actions').style.display = (day !== 2 && day !== 3 && phase !== 'nomination') ? 'block' : 'none';
            
            // Lista Jogadores
            const grid = document.getElementById('players-grid');
            grid.innerHTML = "";
            Object.keys(players).forEach(id => {
                const p = players[id];
                grid.innerHTML += `<div class="card ${id === turn ? 'active' : ''} ${p.status === 'eliminated' ? 'eliminated' : ''}">
                    <b>${p.name}</b><br>${p.immune ? '🛡️' : p.pop+'%'}
                </div>`;
            });

            // Galeria
            if(day === 3 && data.drawings) {
                const gal = document.getElementById('drawings-display');
                gal.innerHTML = "";
                Object.keys(data.drawings).forEach(pid => {
                    gal.innerHTML += `<div class="drawing-card"><img src="${data.drawings[pid]}"><button class="btn-pop" onclick="voteDrawing('${pid}')">VOTAR</button></div>`;
                });
            }

            // Controlos Turno
            const isMeTurn = (turn === myId && players[myId].status === 'playing');
            document.getElementById('controls').style.display = isMeTurn ? 'block' : 'none';

            if(phase === 'nomination') {
                document.getElementById('nomination-actions').style.display = 'block';
                const vT = document.getElementById('vote-targets'); vT.innerHTML = "";
                aliveIds.forEach(tid => {
                    if(tid !== myId && !players[tid].immune) {
                        vT.innerHTML += `<button class="btn-pop" onclick="vote('${tid}')">Votar em ${players[tid].name}</button>`;
                    }
                });
            } else {
                document.getElementById('nomination-actions').style.display = 'none';
            }
        });
    }

    function sendRP(txt = null, isDraw = false) {
        const val = txt || document.getElementById('rp-text').value.trim();
        if(!val && !isDraw) return alert("Escreve algo!");

        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const aliveIds = Object.keys(data.players).filter(id => data.players[id].status === 'playing');
            const idx = aliveIds.indexOf(myId);
            const isLast = (idx === aliveIds.length - 1);
            
            let nDay = data.day || 1;
            let nPhase = data.phase || 'normal';
            let up = {};

            if (isLast) {
                nDay++;
                if (nDay >= 4) nPhase = 'nomination';
            }

            up['/players/' + myId + '/pop'] = (data.players[myId].pop || 50) + 5;
            up['/turn'] = aliveIds[(idx + 1) % aliveIds.length];
            up['/day'] = nDay;
            up['/phase'] = nPhase;
            up['/lastRP'] = isDraw ? `🎨 <b>${myName}</b> terminou o desenho!` : `🎬 <b>${myName}:</b> "${val}"`;
            
            db.ref('rooms/' + currentRoom).update(up);
            if(!isDraw) document.getElementById('rp-text').value = "";
            clearCanvas();
        });
    }

    function voteDrawing(pid) {
        db.ref('rooms/' + currentRoom + '/drawingVotes/' + pid).transaction(v => (v || 0) + 1);
        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const aliveIds = Object.keys(data.players).filter(id => data.players[id].status === 'playing');
            const votes = data.drawingVotes || {};
            const total = Object.values(votes).reduce((a,b) => a+b, 0) + 1;
            
            if(total >= aliveIds.length) {
                let winId = pid; let max = -1;
                Object.keys(votes).forEach(id => { if(votes[id] > max) { max = votes[id]; winId = id; } });
                let up = {};
                up[`/players/${winId}/immune`] = true;
                up['/day'] = 4;
                up['/phase'] = 'nomination';
                up['/turn'] = aliveIds[0];
                up['/lastRP'] = `🛡️ <b>A VOZ:</b> Desenho de ${data.players[winId].name} venceu!`;
                db.ref('rooms/' + currentRoom).update(up);
            } else { alert("Votado!"); }
        });
    }

    function vote(tid) {
        db.ref('rooms/' + currentRoom).get().then(snap => {
            const data = snap.val();
            const aliveIds = Object.keys(data.players).filter(id => data.players[id].status === 'playing');
            const idx = aliveIds.indexOf(myId);
            const isLast = (idx === aliveIds.length - 1);
            let up = {};
            const vts = (data.players[tid].votes || 0) + 1;
            up[`/players/${tid}/votes`] = vts;

            if(isLast) {
                let vic = tid; let mX = vts;
                aliveIds.forEach(id => {
                    let v = (id === tid) ? vts : (data.players[id].votes || 0);
                    if(v > mX) { mX = v; vic = id; }
                });
                up['/players/' + vic + '/status'] = 'eliminated';
                up['/phase'] = 'normal'; up['/day'] = 1;
                up['/lastRP'] = `🔴 <b>A VOZ:</b> ${data.players[vic].name} EXPULSO!`;
                aliveIds.forEach(id => { up[`/players/${id}/votes`] = 0; up[`/players/${id}/immune`] = false; });
                up['/drawings'] = null; up['/drawingVotes'] = null;
            }
            up['/turn'] = aliveIds[(idx + 1) % aliveIds.length];
            db.ref('rooms/' + currentRoom).update(up);
        });
    }

    function sendChat() {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        db.ref('rooms/' + currentRoom + '/chat').push({ name: myName, msg: i.value });
        i.value = "";
    }

    function listenChat() {
        db.ref('rooms/' + currentRoom + '/chat').limitToLast(10).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = "";
            s.forEach(c => { const d = c.val(); b.innerHTML += `<div><b>${d.name}:</b> ${d.msg}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    }
</script>
</body>
</html>
