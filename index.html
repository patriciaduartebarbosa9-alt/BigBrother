<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duelo de Citações Mobile 👁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --pop-bg: #ffb800; --pop-pink: #fd79a8; --pop-teal: #00cec9; --dark: #2d3436; }
        
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Outfit'; background: var(--pop-bg); margin: 0; min-height: 100vh; color: var(--dark); }
        
        /* Layout Adaptável */
        .main-layout { display: flex; flex-direction: column; gap: 15px; padding: 10px; max-width: 1200px; margin: 0 auto; }
        
        @media (min-width: 1024px) {
            .main-layout { display: grid; grid-template-columns: 250px 1fr 300px; height: 95vh; }
        }

        .panel { background: white; border: 4px solid var(--dark); border-radius: 20px; box-shadow: 5px 5px 0 var(--dark); display: flex; flex-direction: column; overflow: hidden; margin-bottom: 10px; }
        .panel-header { background: var(--dark); color: white; padding: 8px; font-weight: 800; text-align: center; text-transform: uppercase; font-size: 0.8em; }
        
        .game-panel { padding: 15px; text-align: center; overflow-y: auto; flex-grow: 1; }
        .logo { font-family: 'Montserrat'; font-size: 1.5em; -webkit-text-stroke: 1px var(--dark); color: white; filter: drop-shadow(2px 2px 0 var(--pop-pink)); margin-bottom: 10px; text-transform: uppercase; }
        
        .player-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 2px solid #eee; font-weight: 700; font-size: 0.9em; }
        .player-item span { color: var(--pop-pink); }

        .btn-pop { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; border: 3px solid var(--dark); font-weight: 900; cursor: pointer; box-shadow: 3px 3px 0 var(--dark); text-transform: uppercase; }
        .btn-pop:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--dark); }
        
        .color-picker { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 3px solid var(--dark); cursor: pointer; }

        #canvas-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; background: white; line-height: 0; }
        canvas { border: 3px solid var(--dark); border-radius: 15px; background: #fff; width: 100% !important; height: auto !important; touch-action: none; cursor: crosshair; }
        
        .chat-container { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 0.9em; background: #fafafa; min-height: 150px; max-height: 300px; }
        .status-msg { background: #fff3cd; border: 2px dashed var(--dark); padding: 8px; border-radius: 10px; margin-bottom: 10px; font-weight: 700; font-size: 0.85em; }
        
        .vote-card { border: 3px solid var(--dark); border-radius: 15px; padding: 10px; margin-top: 15px; background: #fdfdfd; }
        .vote-card img { width: 100%; max-width: 300px; border-radius: 8px; border: 2px solid var(--dark); }

        input, textarea { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid var(--dark); border-radius: 8px; font-family: 'Outfit'; font-size: 16px; } /* font-size 16px evita zoom no iOS */
    </style>
</head>
<body>

<div id="lobby" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div class="panel" style="max-width: 400px; padding: 30px; text-align: center; width: 100%;">
        <div class="logo">DUELO CITAÇÕES</div>
        <input type="text" id="room-id" placeholder="CÓDIGO DA SALA">
        <input type="text" id="my-name" placeholder="TEU NOME">
        <button class="btn-pop" style="background: var(--pop-pink); color: white;" onclick="joinRoom()">ENTRAR</button>
    </div>
</div>

<div id="game-area" class="main-layout" style="display:none;">
    
    <div class="panel">
        <div class="panel-header">PLACAR (ALVO: 100)</div>
        <div id="players-list"></div>
    </div>

    <div class="panel game-panel">
        <div id="status" class="status-msg">Aguardando...</div>
        
        <div id="phase-write" style="display:none;">
            <h3>✍️ Escreve a tua frase:</h3>
            <textarea id="phrase-input" rows="3"></textarea>
            <button class="btn-pop" style="background: var(--pop-teal); color:white;" onclick="submitPhrase()">ENVIAR</button>
        </div>

        <div id="phase-draw" style="display:none;">
            <p>DESENHA:</p>
            <div id="target-phrase" style="font-size: 1.2em; font-weight: 900; color: var(--pop-pink); margin-bottom: 10px;"></div>
            <div class="color-picker" id="colors"></div>
            <div id="canvas-container">
                <canvas id="paintCanvas" width="400" height="400"></canvas>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn-pop" onclick="clearCanvas()">LIMPAR</button>
                <button class="btn-pop" style="background: var(--pop-teal); color:white;" onclick="submitDrawing()">ENVIAR</button>
            </div>
        </div>

        <div id="phase-vote" style="display:none;">
            <h3>⭐ VOTA NO MELHOR</h3>
            <div id="vote-gallery"></div>
        </div>

        <div id="phase-results" style="display:none;">
            <h2 id="winner-text">🏆 FIM!</h2>
            <button class="btn-pop" onclick="location.reload()">NOVO JOGO</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">CHAT OFF</div>
        <div id="chat-box" class="chat-container"></div>
        <div style="padding: 10px; border-top: 2px solid #eee;">
            <input type="text" id="chat-input" placeholder="Conversar...">
            <button class="btn-pop" style="font-size: 0.7em; margin-top: 5px;" onclick="sendChat()">ENVIAR</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bigbrother-termo",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = "", myId = "", myName = "";
    let canvas, ctx, drawing = false, currentColor = "#000000";

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        myName = document.getElementById('my-name').value.trim();
        if(!currentRoom || !myName) return alert("Preenche os campos!");
        
        myId = myName.replace(/\s+/g, '_') + "_" + Math.floor(Math.random()*1000);
        db.ref('duelo/'+currentRoom+'/players/'+myId).set({ name: myName, score: 0 });
        db.ref('duelo/'+currentRoom+'/players/'+myId).onDisconnect().remove();

        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = (window.innerWidth >= 1024) ? 'grid' : 'flex';
        initCanvas();
        initColors();
        listen();
        listenChat();
    }

    function initColors() {
        const colors = ["#000000", "#ff7675", "#74b9ff", "#55efc4", "#a29bfe", "#fd79a8"];
        const container = document.getElementById('colors');
        container.innerHTML = "";
        colors.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.background = c;
            btn.onclick = () => currentColor = c;
            container.appendChild(btn);
        });
    }

    function initCanvas() {
        canvas = document.getElementById('paintCanvas');
        ctx = canvas.getContext('2d');
        ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = currentColor;

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            // Cálculo para manter a precisão mesmo com redimensionamento CSS
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        };

        const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); };
        const move = (e) => { if(!drawing) return; ctx.strokeStyle = currentColor; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
        const stop = () => { drawing = false; };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', stop);
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function submitPhrase() {
        const p = document.getElementById('phrase-input').value.trim();
        if(!p) return;
        db.ref('duelo/'+currentRoom+'/phrases/'+myId).set(p);
        document.getElementById('phrase-input').value = "";
    }

    function submitDrawing() {
        const data = canvas.toDataURL('image/png');
        db.ref('duelo/'+currentRoom+'/drawings/'+myId).set(data);
        clearCanvas();
    }

    function vote(id) {
        db.ref('duelo/'+currentRoom+'/players/'+id+'/score').transaction(s => (s||0)+1);
        db.ref('duelo/'+currentRoom+'/votes/'+myId).set(true);
    }

    function listen() {
        db.ref('duelo/'+currentRoom).on('value', snap => {
            const data = snap.val() || {};
            const players = data.players || {};
            const pIds = Object.keys(players);
            const numP = pIds.length;
            if(numP === 0) return;

            const list = document.getElementById('players-list');
            list.innerHTML = "";
            let winner = null;
            pIds.forEach(id => {
                const s = players[id].score || 0;
                list.innerHTML += `<div class="player-item">${players[id].name} <span>${s} PTS</span></div>`;
                if(s >= 100) winner = players[id].name;
            });

            if(winner) {
                document.getElementById('phase-write').style.display = 'none';
                document.getElementById('phase-draw').style.display = 'none';
                document.getElementById('phase-vote').style.display = 'none';
                document.getElementById('phase-results').style.display = 'block';
                document.getElementById('winner-text').innerText = "🏆 " + winner + " VENCEU!";
                return;
            }

            const phrases = data.phrases || {};
            const drawings = data.drawings || {};
            const votes = data.votes || {};

            if (Object.keys(votes).length >= numP && numP > 1) {
                if (myId === pIds[0]) {
                    setTimeout(() => {
                        db.ref('duelo/'+currentRoom+'/phrases').remove();
                        db.ref('duelo/'+currentRoom+'/drawings').remove();
                        db.ref('duelo/'+currentRoom+'/votes').remove();
                    }, 2000);
                }
                document.getElementById('status').innerText = "Turno encerrado. Próximo em instantes...";
                return;
            }

            if(Object.keys(phrases).length < numP) {
                document.getElementById('phase-write').style.display = 'block';
                document.getElementById('phase-draw').style.display = 'none';
                document.getElementById('phase-vote').style.display = 'none';
                document.getElementById('status').innerText = "FASE: ESCREVER";
            } 
            else if(Object.keys(drawings).length < numP) {
                document.getElementById('phase-write').style.display = 'none';
                document.getElementById('phase-draw').style.display = 'block';
                document.getElementById('phase-vote').style.display = 'none';
                const myIdx = pIds.indexOf(myId);
                const targetId = pIds[(myIdx + 1) % numP];
                document.getElementById('target-phrase').innerText = phrases[targetId];
                document.getElementById('status').innerText = "FASE: DESENHAR";
            }
            else {
                document.getElementById('phase-draw').style.display = 'none';
                document.getElementById('phase-vote').style.display = 'block';
                document.getElementById('status').innerText = "FASE: VOTAR";
                const gal = document.getElementById('vote-gallery');
                gal.innerHTML = "";
                if(votes[myId]) {
                    gal.innerHTML = "<h4>Voto registado! Aguarda...</h4>";
                } else {
                    Object.keys(drawings).forEach(pid => {
                        if(pid !== myId) {
                            gal.innerHTML += `<div class="vote-card"><p>Desenho de: ${players[pid].name}</p><img src="${drawings[pid]}"><button class="btn-pop" onclick="vote('${pid}')">VOTAR ⭐</button></div>`;
                        }
                    });
                }
            }
        });
    }

    function sendChat() {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        db.ref('duelo/'+currentRoom+'/chat').push({ name: myName, msg: i.value });
        i.value = "";
    }

    function listenChat() {
        db.ref('duelo/'+currentRoom+'/chat').limitToLast(15).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(c => { box.innerHTML += `<div><b>${c.val().name}:</b> ${c.val().msg}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
