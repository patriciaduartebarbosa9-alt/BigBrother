<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desenha e Adivinha PT-PT 👁️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --pop-bg: #ffb800; --pop-pink: #fd79a8; --pop-teal: #00cec9; --dark: #2d3436; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Outfit'; background: var(--pop-bg); margin: 0; min-height: 100vh; color: var(--dark); overflow: hidden; }
        
        .main-layout { display: flex; flex-direction: column; gap: 10px; padding: 10px; height: 100vh; }
        @media (min-width: 1024px) { .main-layout { display: grid; grid-template-columns: 220px 1fr 300px; } }

        .panel { background: white; border: 4px solid var(--dark); border-radius: 20px; box-shadow: 4px 4px 0 var(--dark); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background: var(--dark); color: white; padding: 8px; font-weight: 800; text-align: center; text-transform: uppercase; font-size: 0.8em; }
        
        .game-panel { padding: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        .timer { font-size: 1.5em; font-weight: 900; color: var(--pop-pink); background: var(--dark); padding: 5px 15px; border-radius: 50px; margin-bottom: 10px; }
        
        .player-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 2px solid #eee; font-weight: 700; }
        .player-item.turn { background: #fff3cd; }

        .btn-pop { width: 100%; padding: 10px; border-radius: 12px; border: 3px solid var(--dark); font-weight: 900; cursor: pointer; box-shadow: 3px 3px 0 var(--dark); text-transform: uppercase; }
        .btn-pop:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--dark); }
        
        .color-picker { display: flex; gap: 8px; margin-bottom: 10px; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--dark); cursor: pointer; }

        #canvas-wrap { background: white; border: 3px solid var(--dark); border-radius: 15px; width: 100%; max-width: 500px; position: relative; line-height: 0; }
        canvas { width: 100% !important; height: auto !important; touch-action: none; cursor: crosshair; }
        
        .chat-container { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 0.9em; background: #fafafa; }
        .msg-correct { background: #55efc4 !important; font-weight: 900; padding: 5px; border-radius: 5px; text-align: center; }

        input { width: 100%; padding: 12px; border: 3px solid var(--dark); border-radius: 12px; font-size: 16px; }
        .secret-word { font-size: 1.5em; color: var(--pop-teal); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="lobby" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="panel" style="width: 300px; padding: 20px; text-align: center;">
        <h2>PICTIONARY PT</h2>
        <input type="text" id="room-id" placeholder="CÓDIGO SALA" style="margin-bottom:10px">
        <input type="text" id="my-name" placeholder="TEU NOME">
        <button class="btn-pop" style="background: var(--pop-pink); margin-top:15px" onclick="joinRoom()">JOGAR</button>
    </div>
</div>

<div id="game-area" class="main-layout" style="display:none;">
    <div class="panel">
        <div class="panel-header">PONTOS (ALVO: 20)</div>
        <div id="players-list"></div>
    </div>

    <div class="panel game-panel">
        <div id="timer" class="timer">03:00</div>
        
        <div id="draw-controls" style="display:none">
            <p>DESENHA A PALAVRA:</p>
            <div id="word-display" class="secret-word">---</div>
            <div class="color-picker">
                <div class="color-btn" style="background:#000" onclick="changeColor('#000')"></div>
                <div class="color-btn" style="background:#d63031" onclick="changeColor('#d63031')"></div>
                <div class="color-btn" style="background:#0984e3" onclick="changeColor('#0984e3')"></div>
                <div class="color-btn" style="background:#00b894" onclick="changeColor('#00b894')"></div>
                <button onclick="clearCanvas()" style="font-size:10px">LIMPAR</button>
            </div>
        </div>

        <div id="guess-controls" style="display:none">
            <p>ADIVINHA O QUE ELE ESTÁ A DESENHAR!</p>
            <div class="secret-word">? ? ? ? ?</div>
        </div>

        <div id="canvas-wrap">
            <canvas id="paintCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">PALPITES</div>
        <div id="chat-box" class="chat-container"></div>
        <div style="padding:10px">
            <input type="text" id="chat-input" placeholder="Escreve aqui a palavra...">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWHACXWydz1BjmW592oopZg9YOrVQaOYA",
        authDomain: "bigbrother-termo.firebaseapp.com",
        databaseURL: "https://bigbrother-termo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bigbrother-termo",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const PALAVRAS = ["televisão", "frigorífico", "autocarro", "pastilha", "telemóvel", "computador", "garrafa", "cadeira", "martelo", "bicicleta", "castelo", "guitarra", "lanterna", "sanduíche", "comboio", "sapato", "chapéu", "escada", "relógio", "caneta"];
    
    let currentRoom = "", myId = "", myName = "", isMaster = false;
    let canvas, ctx, drawing = false, currentColor = "#000";

    function joinRoom() {
        currentRoom = document.getElementById('room-id').value.trim().toLowerCase();
        myName = document.getElementById('my-name').value.trim();
        if(!currentRoom || !myName) return;
        myId = myName + "_" + Math.floor(Math.random()*1000);
        
        db.ref('pictionary/'+currentRoom+'/players/'+myId).set({ name: myName, score: 0 });
        db.ref('pictionary/'+currentRoom+'/players/'+myId).onDisconnect().remove();
        
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-area').style.display = (window.innerWidth >= 1024) ? 'grid' : 'flex';
        
        initCanvas();
        listen();
    }

    function initCanvas() {
        canvas = document.getElementById('paintCanvas');
        ctx = canvas.getContext('2d');
        ctx.lineWidth = 5; ctx.lineCap = 'round';
        
        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) };
        };

        const start = (e) => { 
            if(!isMaster) return;
            drawing = true; ctx.beginPath(); 
            const p = getPos(e); ctx.moveTo(p.x, p.y); 
        };
        const move = (e) => {
            if(!drawing || !isMaster) return;
            const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = currentColor; ctx.stroke();
            sendStroke(p.x, p.y, false);
        };
        const stop = () => { drawing = false; sendStroke(0,0,true); };

        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); canvas.addEventListener('touchend', stop);
    }

    function sendStroke(x, y, end) {
        db.ref('pictionary/'+currentRoom+'/drawing').set({ x, y, end, color: currentColor, time: Date.now() });
    }

    function changeColor(c) { currentColor = c; }
    function clearCanvas() { db.ref('pictionary/'+currentRoom+'/clear').set(Date.now()); }

    // Lógica do Chat e Palpites
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const val = e.target.value.toLowerCase().trim();
            if(!val) return;
            db.ref('pictionary/'+currentRoom+'/lastGuess').set({ name: myName, msg: val, id: myId, time: Date.now() });
            e.target.value = "";
        }
    });

    function listen() {
        // Escutar desenho remoto
        db.ref('pictionary/'+currentRoom+'/drawing').on('value', snap => {
            if(isMaster) return;
            const data = snap.val();
            if(!data) return;
            if(data.end) { ctx.beginPath(); return; }
            ctx.strokeStyle = data.color;
            ctx.lineTo(data.x, data.y); ctx.stroke();
        });

        db.ref('pictionary/'+currentRoom+'/clear').on('value', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
        });

        // Escutar estado do jogo
        db.ref('pictionary/'+currentRoom).on('value', snap => {
            const data = snap.val() || {};
            const players = data.players || {};
            const pIds = Object.keys(players).sort();
            if(pIds.length < 2) return;

            // Placar e vencedor
            const list = document.getElementById('players-list');
            list.innerHTML = "";
            pIds.forEach(id => {
                const s = players[id].score || 0;
                list.innerHTML += `<div class="player-item"> ${players[id].name} <span>${s} PTS</span></div>`;
                if(s >= 20) {
                    alert("🏆 " + players[id].name + " VENCEU!");
                    db.ref('pictionary/'+currentRoom).remove();
                    location.reload();
                }
            });

            // Turnos e Mestre
            const round = data.round || 0;
            const mId = pIds[round % pIds.length];
            isMaster = (myId === mId);
            
            document.getElementById('draw-controls').style.display = isMaster ? 'block' : 'none';
            document.getElementById('guess-controls').style.display = isMaster ? 'none' : 'block';

            // Gerar palavra se não houver
            if(isMaster && !data.word) {
                const word = PALAVRAS[Math.floor(Math.random()*PALAVRAS.length)];
                db.ref('pictionary/'+currentRoom+'/word').set(word);
                db.ref('pictionary/'+currentRoom+'/startTime').set(Date.now());
            }
            document.getElementById('word-display').innerText = data.word || "...";

            // Timer (3 min = 180s)
            if(data.startTime) {
                const diff = Math.floor((Date.now() - data.startTime) / 1000);
                const remaining = Math.max(0, 180 - diff);
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                document.getElementById('timer').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                
                if(remaining === 0 && isMaster) { // Tempo acabou
                    db.ref('pictionary/'+currentRoom+'/round').transaction(r => (r||0)+1);
                    db.ref('pictionary/'+currentRoom+'/word').remove();
                }
            }
        });

        // Escutar palpites
        db.ref('pictionary/'+currentRoom+'/lastGuess').on('value', snap => {
            const g = snap.val();
            if(!g) return;
            const box = document.getElementById('chat-box');
            
            db.ref('pictionary/'+currentRoom+'/word').get().then(wordSnap => {
                const secret = wordSnap.val();
                let isCorrect = (g.msg === secret);
                
                const div = document.createElement('div');
                div.className = isCorrect ? 'msg-correct' : '';
                div.innerHTML = `<b>${g.name}:</b> ${isCorrect ? 'ACERTOU A PALAVRA!' : g.msg}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;

                if(isCorrect && isMaster) {
                    // Dar pontos a ambos e mudar rodada
                    db.ref('pictionary/'+currentRoom+'/players/'+g.id+'/score').transaction(s => (s||0)+1);
                    db.ref('pictionary/'+currentRoom+'/players/'+myId+'/score').transaction(s => (s||0)+1);
                    setTimeout(() => {
                        db.ref('pictionary/'+currentRoom+'/round').transaction(r => (r||0)+1);
                        db.ref('pictionary/'+currentRoom+'/word').remove();
                        db.ref('pictionary/'+currentRoom+'/clear').set(Date.now());
                    }, 1000);
                }
            });
        });
    }
</script>
</body>
</html>
